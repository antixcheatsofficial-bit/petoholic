<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petoholic - Your Pet's Paradise</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🐾</span>
                    <h1>Petoholic</h1>
                </div>
                <button class="cart-button" id="cartBtn" aria-label="Shopping cart">
                    <svg class="cart-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="cart-count" id="cartCount">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <h1 class="hero-title">Welcome to Petoholic! 🐾</h1>
            <p class="hero-subtitle">Everything your furry friend needs in one place</p>
        </div>
    </section>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Categories will be dynamically inserted here -->
            <div id="categoriesContainer"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 Petoholic. All rights reserved.</p>
            <p class="footer-subtitle">Made by [RASIN](https://itzrasin.vercel.app/) with ❤️ for your pets</p>
        </div>
    </footer>

    <!-- Product Modal -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalProductName"></h2>
                <button class="close-btn" id="closeProductModal" aria-label="Close">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="product-details">
                    <div class="product-images">
                        <div class="main-image-container">
                            <img id="modalMainImage" src="" alt="" class="main-image">
                            <button class="nav-btn prev-btn" id="prevImageBtn" aria-label="Previous image">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="15 18 9 12 15 6"></polyline>
                                </svg>
                            </button>
                            <button class="nav-btn next-btn" id="nextImageBtn" aria-label="Next image">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="9 18 15 12 9 6"></polyline>
                                </svg>
                            </button>
                        </div>
                        <div class="thumbnail-container" id="thumbnailContainer"></div>
                    </div>
                    <div class="product-info">
                        <p class="product-category" id="modalProductCategory"></p>
                        <p class="product-price" id="modalProductPrice"></p>
                        <div class="product-description-section">
                            <h3>Description</h3>
                            <p id="modalProductDescription"></p>
                        </div>
                        <div class="product-actions">
                            <button class="btn btn-outline" id="addToCartBtn">Add to Cart</button>
                            <button class="btn btn-primary" id="orderNowBtn">Order Now</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Cart Modal -->
    <div class="modal" id="cartModal">
        <div class="modal-content cart-modal-content">
            <div class="modal-header">
                <h2>Shopping Cart</h2>
                <button class="close-btn" id="closeCartModal" aria-label="Close">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body cart-body">
                <div id="cartItemsContainer"></div>
            </div>
            <div class="cart-footer" id="cartFooter">
                <div class="cart-total">
                    <span>Total:</span>
                    <span class="total-amount" id="totalAmount">$0.00</span>
                </div>
                <button class="btn btn-primary btn-full" id="checkoutBtn">Proceed to Checkout</button>
            </div>
        </div>
    </div>

    <!-- Order Form Modal -->
    <div class="modal" id="orderModal">
        <div class="modal-content order-modal-content">
            <div class="modal-header">
                <h2>Order Details</h2>
                <button class="close-btn" id="closeOrderModal" aria-label="Close">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="order-total-display" id="orderTotalDisplay"></div>
                <form id="orderForm">
                    <div class="form-group">
                        <label for="fullName">Full Name *</label>
                        <input type="text" id="fullName" name="fullName" required placeholder="Enter your full name">
                    </div>
                    <div class="form-group">
                        <label for="address">Address *</label>
                        <textarea id="address" name="address" required rows="3" placeholder="Enter your delivery address"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="phoneNumber">Phone Number *</label>
                        <input type="tel" id="phoneNumber" name="phoneNumber" required placeholder="Enter your phone number">
                    </div>
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" required placeholder="Enter your email address">
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Place Order</button>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
